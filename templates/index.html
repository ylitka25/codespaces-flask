<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .add-task-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        #new-task {
            flex: 2;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #new-task:focus {
            outline: none;
            border-color: #667eea;
        }

        select, input[type="date"] {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            cursor: pointer;
        }

        .priority-high { background-color: #ffebee; }
        .priority-medium { background-color: #fff3e0; }
        .priority-low { background-color: #e8f5e8; }

        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .sort-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            align-items: center;
        }

        .sort-controls label {
            color: #555;
            font-weight: 600;
        }

        .task-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            color: #555;
        }

        #task-list {
            list-style: none;
        }

        #task-list li {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 10px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            animation: fadeIn 0.5s ease;
            cursor: pointer;
        }

        #task-list li:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateX(5px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .completed .task-title {
            text-decoration: line-through;
            color: #999;
        }

        .task-meta {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #666;
        }

        .priority-badge {
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .priority-high .priority-badge { background: #ff5252; color: white; }
        .priority-medium .priority-badge { background: #ffb74d; color: white; }
        .priority-low .priority-badge { background: #66bb6a; color: white; }

        .due-date {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .overdue {
            color: #ff5252;
            font-weight: 600;
            background: #ffebee;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .delete-btn {
            padding: 8px 15px;
            background: #ff5252;
            font-size: 14px;
        }

        .delete-btn:hover {
            background: #ff1744;
            box-shadow: 0 5px 15px rgba(255, 82, 82, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 18px;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        /* Идея для удобства: индикатор выполнения */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Task Manager Pro</h1>
        
        <div class="task-stats">
            <span>Всего задач: <strong id="total-tasks">0</strong></span>
            <span>Выполнено: <strong id="completed-tasks">0</strong></span>
            <span>Просрочено: <strong id="overdue-tasks">0</strong></span>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>

        <div class="add-task-section">
            <div class="input-group">
                <input type="text" id="new-task" placeholder="Что нужно сделать?">
                <select id="task-priority">
                    <option value="high">🔥 Высокий</option>
                    <option value="medium" selected>⚡ Средний</option>
                    <option value="low">🌱 Низкий</option>
                </select>
                <input type="date" id="task-due-date">
            </div>
            <button onclick="addTask()">➕ Добавить задачу</button>
        </div>

        <div class="sort-controls">
            <label>Сортировать по:</label>
            <select id="sort-by" onchange="sortTasks()">
                <option value="priority">Приоритету</option>
                <option value="dueDate">Дате</option>
                <option value="title">Названию</option>
            </select>
            <select id="sort-order" onchange="sortTasks()">
                <option value="asc">Возрастание</option>
                <option value="desc">Убывание</option>
            </select>
            <select id="filter-priority" onchange="sortTasks()">
                <option value="all">Все приоритеты</option>
                <option value="high">🔥 Высокий</option>
                <option value="medium">⚡ Средний</option>
                <option value="low">🌱 Низкий</option>
            </select>
        </div>

        <ul id="task-list"></ul>
    </div>

    <script>
        let tasks = [];

        async function fetchTasks() {
            try {
                const res = await fetch('/tasks');
                tasks = await res.json();
                updateStats();
                sortTasks();
            } catch (error) {
                console.error('Error fetching tasks:', error);
            }
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const overdue = tasks.filter(t => {
                if (t.completed || !t.dueDate) return false;
                return new Date(t.dueDate) < new Date();
            }).length;

            document.getElementById('total-tasks').textContent = total;
            document.getElementById('completed-tasks').textContent = completed;
            document.getElementById('overdue-tasks').textContent = overdue;

            const progress = total ? (completed / total) * 100 : 0;
            document.getElementById('progress-fill').style.width = progress + '%';
        }

        function sortTasks() {
            const sortBy = document.getElementById('sort-by').value;
            const sortOrder = document.getElementById('sort-order').value;
            const filterPriority = document.getElementById('filter-priority').value;

            let filteredTasks = tasks;
            if (filterPriority !== 'all') {
                filteredTasks = tasks.filter(t => t.priority === filterPriority);
            }

            const sortedTasks = [...filteredTasks].sort((a, b) => {
                let comparison = 0;
                
                if (sortBy === 'priority') {
                    const priorityWeight = { high: 3, medium: 2, low: 1 };
                    comparison = priorityWeight[b.priority || 'medium'] - priorityWeight[a.priority || 'medium'];
                } else if (sortBy === 'dueDate') {
                    if (!a.dueDate) return 1;
                    if (!b.dueDate) return -1;
                    comparison = new Date(a.dueDate) - new Date(b.dueDate);
                } else {
                    comparison = a.title.localeCompare(b.title);
                }

                return sortOrder === 'asc' ? comparison : -comparison;
            });

            renderTasks(sortedTasks);
        }

        function renderTasks(tasksToRender) {
            const list = document.getElementById('task-list');
            list.innerHTML = '';

            if (tasksToRender.length === 0) {
                list.innerHTML = '<div class="empty-state"><i>📭</i><br>Задач пока нет. Создайте первую!</div>';
                return;
            }

            tasksToRender.forEach(task => {
                const li = document.createElement('li');
                li.className = `priority-${task.priority || 'medium'}`;
                if (task.completed) li.classList.add('completed');

                const isOverdue = !task.completed && task.dueDate && new Date(task.dueDate) < new Date();

                li.innerHTML = `
                    <div class="task-content" onclick="toggleTask(${task.id})">
                        <div class="task-title">${task.title}</div>
                        <div class="task-meta">
                            <span class="priority-badge">${getPriorityLabel(task.priority)}</span>
                            ${task.dueDate ? `
                                <span class="due-date ${isOverdue ? 'overdue' : ''}">
                                    📅 ${formatDate(task.dueDate)}
                                    ${isOverdue ? ' (просрочено!)' : ''}
                                </span>
                            ` : ''}
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">✖</button>
                `;

                list.appendChild(li);
            });
        }

        function getPriorityLabel(priority) {
            const labels = { high: '🔥 Высокий', medium: '⚡ Средний', low: '🌱 Низкий' };
            return labels[priority] || '⚡ Средний';
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('ru-RU');
        }

        async function addTask() {
            const input = document.getElementById('new-task');
            const priority = document.getElementById('task-priority').value;
            const dueDate = document.getElementById('task-due-date').value;

            if (!input.value.trim()) return;

            try {
                await fetch('/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: input.value,
                        priority: priority,
                        dueDate: dueDate || null
                    })
                });

                input.value = '';
                document.getElementById('task-due-date').value = '';
                await fetchTasks();
            } catch (error) {
                console.error('Error adding task:', error);
            }
        }

        async function toggleTask(id) {
            try {
                await fetch(`/tasks/${id}`, { method: 'PUT' });
                await fetchTasks();
            } catch (error) {
                console.error('Error toggling task:', error);
            }
        }

        async function deleteTask(id) {
            try {
                await fetch(`/tasks/${id}`, { method: 'DELETE' });
                await fetchTasks();
            } catch (error) {
                console.error('Error deleting task:', error);
            }
        }

        // Загрузка задач при старте
        fetchTasks();
    </script>
</body>
</html>
